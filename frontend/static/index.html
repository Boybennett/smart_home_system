<!doctype html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Smart Home Demo</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 24 24%22><text y=%2220%22 font-size=%2220%22>🏠</text></svg>" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="app-shell">
    <aside class="sidebar" id="sidebar">
      <div class="brand">
        <span class="brand-mark" aria-hidden="true">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none"><path d="M3 11.5L12 4l9 7.5" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/><path d="M5 10v9a1 1 0 0 0 1 1h4v-6h4v6h4a1 1 0 0 0 1-1v-9" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </span>
        <span class="brand-name">Smart Home</span>
      </div>

      <div class="home-picker">
        <label for="home-select" class="field-label">Active home</label>
        <select id="home-select" aria-label="Select home"></select>
      </div>

      <nav class="nav" aria-label="Main navigation">
        <button class="nav-item is-active" data-view="overview" type="button">
          <svg viewBox="0 0 24 24" width="18" height="18" fill="none"><path d="M3 11.5L12 4l9 7.5M5 10v9a1 1 0 0 0 1 1h4v-6h4v6h4a1 1 0 0 0 1-1v-9" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
          <span>Overview</span>
        </button>
        <button class="nav-item" data-view="devices" type="button">
          <svg viewBox="0 0 24 24" width="18" height="18" fill="none"><rect x="4" y="3" width="16" height="18" rx="2" stroke="currentColor" stroke-width="1.8"/><path d="M9 7h6M9 11h6M9 15h3" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>
          <span>Rooms &amp; Devices</span>
        </button>
        <button class="nav-item" data-view="automation" type="button">
          <svg viewBox="0 0 24 24" width="18" height="18" fill="none"><path d="M13 2 4 14h6l-1 8 9-12h-6l1-8Z" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"/></svg>
          <span>Automation</span>
        </button>
        <button class="nav-item" data-view="household" type="button">
          <svg viewBox="0 0 24 24" width="18" height="18" fill="none"><circle cx="9" cy="8" r="3.2" stroke="currentColor" stroke-width="1.8"/><path d="M2.8 19c.7-3 3-4.8 6.2-4.8s5.5 1.8 6.2 4.8" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/><circle cx="17" cy="8.5" r="2.4" stroke="currentColor" stroke-width="1.6"/><path d="M15.2 14.6c2.6.2 4.3 1.8 4.9 4.4" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/></svg>
          <span>Household</span>
        </button>
        <button class="nav-item" data-view="homes" type="button">
          <svg viewBox="0 0 24 24" width="18" height="18" fill="none"><rect x="3" y="4" width="18" height="16" rx="2" stroke="currentColor" stroke-width="1.8"/><path d="M3 9h18M8 4v5" stroke="currentColor" stroke-width="1.8"/></svg>
          <span>Homes</span>
        </button>
        <button class="nav-item" data-view="settings" type="button">
          <svg viewBox="0 0 24 24" width="18" height="18" fill="none"><circle cx="12" cy="12" r="3" stroke="currentColor" stroke-width="1.8"/><path d="M19.4 13a7.7 7.7 0 0 0 0-2l2-1.5-2-3.4-2.3.9a7.6 7.6 0 0 0-1.7-1L15 3h-4l-.4 2.5a7.6 7.6 0 0 0-1.7 1l-2.3-.9-2 3.4L6.6 11a7.7 7.7 0 0 0 0 2l-2 1.5 2 3.4 2.3-.9c.5.4 1.1.75 1.7 1L11 21h4l.4-2.5c.6-.25 1.2-.6 1.7-1l2.3.9 2-3.4L19.4 13Z" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/></svg>
          <span>Device Types</span>
        </button>
      </nav>

      <div class="sidebar-footer">
        <span class="api-dot" id="api-status" title="API status"></span>
        <span id="api-status-label">Checking API…</span>
      </div>
    </aside>

    <div class="mobile-topbar">
      <button id="menu-toggle" class="icon-btn" type="button" aria-label="Toggle navigation" aria-expanded="false">
        <svg viewBox="0 0 24 24" width="20" height="20" fill="none"><path d="M4 6h16M4 12h16M4 18h16" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>
      </button>
      <span class="brand-name">Smart Home</span>
    </div>

    <main class="content">
      <header class="content-header">
        <div>
          <h1 id="view-title">Overview</h1>
          <p id="view-subtitle" class="muted">Live status for the selected home</p>
        </div>
        <div class="header-actions" id="header-actions"></div>
      </header>

      <section id="view-overview" class="view is-active"></section>
      <section id="view-devices" class="view"></section>
      <section id="view-automation" class="view"></section>
      <section id="view-household" class="view"></section>
      <section id="view-homes" class="view"></section>
      <section id="view-settings" class="view"></section>
    </main>
  </div>

  <div id="modal-root" class="modal-root" aria-hidden="true"></div>
  <div id="toast-root" class="toast-root" aria-live="polite"></div>

  <script src="app.js"></script>
</body>
</html>
